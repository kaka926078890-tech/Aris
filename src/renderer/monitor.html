<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.tailwindcss.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>监控面板 - Aris</title>
  <style>
    .no-drag { -webkit-app-region: no-drag; }
    .tab-active { border-bottom-color: rgb(34 211 238); color: rgb(34 211 238); }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 flex flex-col h-screen overflow-hidden">
  <header class="flex-shrink-0 flex items-center gap-2 border-b border-cyan-500/30 px-4 py-2 no-drag">
    <h1 class="text-lg font-medium text-cyan-200">监控面板</h1>
    <nav class="flex gap-1">
      <button id="tabToken" class="tab-active px-3 py-1.5 text-sm rounded-t border border-b-0 border-cyan-500/40 border-b-transparent">Token 统计</button>
      <button id="tabFiles" class="px-3 py-1.5 text-sm rounded-t border border-b-0 border-slate-600 border-b-transparent text-slate-400 hover:text-slate-200">文件修改</button>
    </nav>
    <button id="refreshBtn" class="ml-auto text-xs px-3 py-1.5 rounded border border-cyan-500/50 text-cyan-300 hover:bg-cyan-500/20">刷新</button>
  </header>
  <main class="flex-1 min-h-0 overflow-hidden flex flex-col">
    <section id="panelToken" class="flex-1 min-h-0 flex flex-col overflow-hidden">
      <div class="flex-shrink-0 px-4 py-2 flex items-center gap-4 border-b border-slate-700">
        <label class="text-xs text-slate-400">按日期</label>
        <input id="filterDate" type="date" class="bg-black/40 border border-cyan-500/40 rounded px-2 py-1 text-sm text-cyan-100" />
        <label class="text-xs text-slate-400">会话 ID</label>
        <input id="filterSession" type="text" placeholder="筛选 session…" class="flex-1 min-w-0 max-w-xs bg-black/40 border border-cyan-500/40 rounded px-2 py-1 text-sm text-cyan-100" />
        <span id="tokenSummary" class="text-xs text-slate-500"></span>
      </div>
      <div class="flex-1 min-h-0 overflow-auto px-4 py-2">
        <table class="w-full text-sm border-collapse">
          <thead>
            <tr class="text-left text-slate-400 border-b border-slate-600">
              <th class="py-2 pr-2">时间</th>
              <th class="py-2 pr-2">会话</th>
              <th class="py-2 pr-2 text-right">输入 token</th>
              <th class="py-2 pr-2 text-right">输出 token</th>
              <th class="py-2 text-right">估算</th>
            </tr>
          </thead>
          <tbody id="tokenBody"></tbody>
        </table>
        <p id="tokenEmpty" class="text-slate-500 text-sm py-4 hidden">暂无 token 记录</p>
      </div>
    </section>
    <section id="panelFiles" class="hidden flex-1 min-h-0 flex flex-col overflow-hidden">
      <div class="flex-shrink-0 px-4 py-2 flex items-center gap-2 border-b border-slate-700">
        <label class="text-xs text-slate-400">路径筛选</label>
        <input id="filterPath" type="text" placeholder="路径包含…" class="flex-1 min-w-0 max-w-md bg-black/40 border border-cyan-500/40 rounded px-2 py-1 text-sm text-cyan-100" />
      </div>
      <div class="flex-1 min-h-0 overflow-auto px-4 py-2">
        <table class="w-full text-sm border-collapse">
          <thead>
            <tr class="text-left text-slate-400 border-b border-slate-600">
              <th class="py-2 pr-2">路径</th>
              <th class="py-2 pr-2 text-right">修改次数</th>
              <th class="py-2">最后修改时间</th>
            </tr>
          </thead>
          <tbody id="filesBody"></tbody>
        </table>
        <p id="filesEmpty" class="text-slate-500 text-sm py-4 hidden">暂无文件修改记录</p>
      </div>
    </section>
  </main>
  <script>
    const tabToken = document.getElementById('tabToken');
    const tabFiles = document.getElementById('tabFiles');
    const panelToken = document.getElementById('panelToken');
    const panelFiles = document.getElementById('panelFiles');
    const tokenBody = document.getElementById('tokenBody');
    const tokenEmpty = document.getElementById('tokenEmpty');
    const filesBody = document.getElementById('filesBody');
    const filesEmpty = document.getElementById('filesEmpty');
    const filterDate = document.getElementById('filterDate');
    const filterSession = document.getElementById('filterSession');
    const filterPath = document.getElementById('filterPath');
    const tokenSummary = document.getElementById('tokenSummary');
    const refreshBtn = document.getElementById('refreshBtn');

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString('zh-CN', { dateStyle: 'short', timeStyle: 'medium' });
    }

    function renderToken(list) {
      const dateVal = filterDate.value || '';
      const sessionVal = (filterSession.value || '').trim().toLowerCase();
      let filtered = list || [];
      if (dateVal) {
        filtered = filtered.filter((r) => (r.created_at || '').startsWith(dateVal));
      }
      if (sessionVal) {
        filtered = filtered.filter((r) => (r.session_id || '').toLowerCase().includes(sessionVal));
      }
      tokenBody.innerHTML = '';
      if (filtered.length === 0) {
        tokenEmpty.classList.remove('hidden');
        tokenSummary.textContent = '';
        return;
      }
      tokenEmpty.classList.add('hidden');
      const totalIn = filtered.reduce((s, r) => s + (Number(r.input_tokens) || 0), 0);
      const totalOut = filtered.reduce((s, r) => s + (Number(r.output_tokens) || 0), 0);
      tokenSummary.textContent = `共 ${filtered.length} 条 | 输入合计 ${totalIn} | 输出合计 ${totalOut} | 均值 输入 ${Math.round(totalIn / filtered.length)} 输出 ${Math.round(totalOut / filtered.length)}`;
      filtered.forEach((r) => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-slate-700/50';
        tr.innerHTML = `
          <td class="py-1.5 pr-2 text-slate-300">${formatTime(r.created_at)}</td>
          <td class="py-1.5 pr-2 text-slate-400 font-mono text-xs truncate max-w-[120px]" title="${r.session_id || ''}">${(r.session_id || '').slice(-12)}</td>
          <td class="py-1.5 pr-2 text-right">${r.input_tokens ?? 0}</td>
          <td class="py-1.5 pr-2 text-right">${r.output_tokens ?? 0}</td>
          <td class="py-1.5 text-right text-slate-500">${r.is_estimated ? '是' : ''}</td>
        `;
        tokenBody.appendChild(tr);
      });
    }

    function renderFiles(list) {
      const pathVal = (filterPath.value || '').trim().toLowerCase();
      let filtered = list || [];
      if (pathVal) {
        filtered = filtered.filter((r) => (r.path || '').toLowerCase().includes(pathVal));
      }
      filesBody.innerHTML = '';
      if (filtered.length === 0) {
        filesEmpty.classList.remove('hidden');
        return;
      }
      filesEmpty.classList.add('hidden');
      filtered.forEach((r) => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-slate-700/50';
        tr.innerHTML = `
          <td class="py-1.5 pr-2 text-cyan-200 font-mono text-xs break-all">${(r.path || '').replace(/</g, '&lt;')}</td>
          <td class="py-1.5 pr-2 text-right">${r.modificationCount ?? 0}</td>
          <td class="py-1.5 text-slate-400">${formatTime(r.lastModifiedAt)}</td>
        `;
        filesBody.appendChild(tr);
      });
    }

    async function load() {
      if (!window.monitorApi) return;
      try {
        const [tokenList, fileList] = await Promise.all([
          window.monitorApi.getTokenUsageRecords(),
          window.monitorApi.getFileModifications(),
        ]);
        window._tokenList = tokenList || [];
        window._fileList = fileList || [];
        renderToken(window._tokenList);
        renderFiles(window._fileList);
      } catch (e) {
        console.error(e);
      }
    }

    tabToken.addEventListener('click', () => {
      tabToken.classList.add('tab-active');
      tabToken.classList.remove('border-slate-600');
      tabToken.classList.add('border-cyan-500/40');
      tabFiles.classList.remove('tab-active');
      tabFiles.classList.add('border-slate-600', 'text-slate-400');
      tabFiles.classList.remove('border-cyan-500/40', 'text-cyan-200');
      panelToken.classList.remove('hidden');
      panelFiles.classList.add('hidden');
    });

    tabFiles.addEventListener('click', () => {
      tabFiles.classList.add('tab-active');
      tabFiles.classList.remove('border-slate-600', 'text-slate-400');
      tabFiles.classList.add('border-cyan-500/40', 'text-cyan-200');
      tabToken.classList.remove('tab-active');
      tabToken.classList.add('border-slate-600', 'text-slate-400');
      tabToken.classList.remove('border-cyan-500/40', 'text-cyan-200');
      panelFiles.classList.remove('hidden');
      panelToken.classList.add('hidden');
    });

    filterDate.addEventListener('change', () => { if (window._tokenList) renderToken(window._tokenList); });
    filterSession.addEventListener('input', () => { if (window._tokenList) renderToken(window._tokenList); });
    filterPath.addEventListener('input', () => { if (window._fileList) renderFiles(window._fileList); });

    refreshBtn.addEventListener('click', load);

    load();
  </script>
</body>
</html>
