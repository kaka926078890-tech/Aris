<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.tailwindcss.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Aris</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #canvas-container { width: 100%; min-height: 0; }
    .drag-region { -webkit-app-region: drag; }
    .no-drag { -webkit-app-region: no-drag; }
    #bubbles-wrap::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="flex flex-col h-full">
  <div id="drag-bar" class="h-9 flex-shrink-0 flex" style="-webkit-app-region: drag">
    <div class="w-[70px] flex-shrink-0 no-drag" style="-webkit-app-region: no-drag"></div>
    <div class="flex-1" style="-webkit-app-region: drag"></div>
  </div>
  <div id="canvas-container" class="flex-1 no-drag"></div>
  <div id="dialogue-overlay" class="hidden fixed inset-0 flex flex-col items-center justify-end pb-8 pointer-events-none">
    <div id="bubbles-wrap" class="w-full max-w-sm max-h-48 overflow-y-auto overflow-x-hidden pointer-events-auto flex flex-col gap-2 px-2 justify-end scroll-smooth" style="scrollbar-width: none; -ms-overflow-style: none;">
      <div id="bubbles"></div>
    </div>
    <div class="w-full max-w-sm px-2 pt-2 pointer-events-auto no-drag">
      <div class="flex gap-2">
        <input id="dialogue-input" type="text" placeholder="说点什么…" class="flex-1 bg-black/60 text-cyan-200 border border-cyan-500/50 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-cyan-400" />
        <button id="dialogue-send" class="bg-cyan-500/30 text-cyan-200 border border-cyan-500/50 rounded px-3 py-2 text-sm hover:bg-cyan-500/50">发送</button>
      </div>
    </div>
  </div>
  <script src="./dist/bundle.js"></script>
</body>
</html>
