<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.tailwindcss.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Aris</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #canvas-container { width: 100%; min-height: 0; }
    .drag-region { -webkit-app-region: drag; }
    .no-drag { -webkit-app-region: no-drag; }
    #bubbles-wrap::-webkit-scrollbar { display: none; }
    #bubbles-wrap { overflow-y: auto; -webkit-overflow-scrolling: touch; max-height: calc(100vh - 7rem); }
    #bubbles { width: 100%; }
    .bubble-scroll-inner::-webkit-scrollbar { display: none; }
    .bubble-scroll-inner { scrollbar-width: none; -ms-overflow-style: none; }
    .bubble-content { white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; line-height: 1.45; overflow-x: hidden; max-width: 100%; }
    .bubble-content .tool-call-tag { display: inline-block; margin: 2px 0; padding: 2px 8px; border-radius: 6px; background: rgba(6, 182, 212, 0.2); color: rgba(34, 211, 238, 0.95); font-size: 0.75rem; }
    .bubble-content .code-block { display: block; margin: 4px 0; padding: 6px 8px; border-radius: 6px; background: rgba(0,0,0,0.35); font-family: ui-monospace, monospace; font-size: 0.8em; overflow-x: auto; white-space: pre-wrap; }
  </style>
</head>
<body class="flex flex-col h-full">
  <div id="drag-bar" class="h-9 flex-shrink-0 flex overflow-hidden min-w-0" style="-webkit-app-region: drag">
    <div class="w-[70px] flex-shrink-0 no-drag" style="-webkit-app-region: no-drag"></div>
    <div class="flex-1 min-w-0 overflow-hidden" style="-webkit-app-region: drag"></div>
  </div>
  <div id="canvas-container" class="flex-1 no-drag"></div>
  <!-- 对话层从 top-9 开始，不覆盖标题栏/关闭最小化按钮；对话区域可纵向滚动 -->
  <div id="dialogue-overlay" class="hidden fixed top-9 left-0 right-0 bottom-0 flex flex-col items-center justify-end pb-6 pointer-events-none">
    <div id="bubbles-wrap" class="w-full max-w-sm flex-1 min-h-0 overflow-y-auto overflow-x-hidden pointer-events-auto flex flex-col px-2 pt-2 scroll-smooth overscroll-behavior-contain" style="scrollbar-width: none; -ms-overflow-style: none;">
      <div id="bubbles-spacer" class="min-h-0 flex-1"></div>
      <div id="bubbles" class="flex flex-col gap-2 flex-shrink-0"></div>
    </div>
    <div class="w-full max-w-sm px-2 pt-2 flex-shrink-0 pointer-events-auto no-drag">
      <input id="dialogue-input" type="text" class="w-full bg-black/60 text-cyan-200 border border-cyan-500/50 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-cyan-400" />
    </div>
  </div>
  <script src="./dist/bundle.js"></script>
</body>
</html>
