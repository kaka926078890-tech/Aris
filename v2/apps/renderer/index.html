<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aris v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #fafafa; }
    .bubble-user { background: #e0f2fe; color: #0c4a6e; }
    .bubble-assistant { background: #f0fdf4; color: #14532d; }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50">
  <header class="bg-white border-b border-slate-200 px-4 py-2 flex items-center justify-between">
    <h1 class="text-lg font-medium text-slate-800">Aris v2</h1>
    <button id="btn-minimize" class="p-1 rounded hover:bg-slate-100 text-slate-600">−</button>
  </header>
  <main class="flex-1 overflow-y-auto p-4 space-y-3" id="messages"></main>
  <footer class="border-t border-slate-200 bg-white p-3">
    <div class="flex gap-2">
      <input type="text" id="input" placeholder="输入消息…" class="flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-sky-500 focus:border-sky-500" />
      <button id="btn-send" class="rounded-lg bg-sky-600 text-white px-4 py-2 text-sm font-medium hover:bg-sky-700">发送</button>
    </div>
  </footer>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const btnSend = document.getElementById('btn-send');
    const btnMinimize = document.getElementById('btn-minimize');

    function addBubble(role, content) {
      const div = document.createElement('div');
      div.className = 'rounded-lg px-3 py-2 max-w-[85%] ' + (role === 'user' ? 'bubble-user ml-auto' : 'bubble-assistant mr-auto');
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    let streamBuffer = '';
    function appendChunk(chunk) {
      streamBuffer += chunk;
      let last = messagesEl.querySelector('.streaming');
      if (!last) {
        last = document.createElement('div');
        last.className = 'rounded-lg px-3 py-2 max-w-[85%] bubble-assistant mr-auto streaming';
        messagesEl.appendChild(last);
      }
      last.textContent = streamBuffer;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function finishStream() {
      const last = messagesEl.querySelector('.streaming');
      if (last) last.classList.remove('streaming');
      streamBuffer = '';
    }

    btnSend.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

    async function send() {
      const text = inputEl.value.trim();
      if (!text || !window.aris) return;
      inputEl.value = '';
      addBubble('user', text);
      const unsubChunk = window.aris.onDialogueChunk(appendChunk);
      try {
        const result = await window.aris.sendMessage(text);
        finishStream();
        unsubChunk && unsubChunk();
        if (result && result.content) addBubble('assistant', result.content);
        if (result && result.error) addBubble('assistant', '[出错了]');
      } catch (e) {
        finishStream();
        unsubChunk && unsubChunk();
        addBubble('assistant', '[发送失败]');
      }
    }

    if (window.aris && window.aris.onProactive) {
      window.aris.onProactive((msg) => addBubble('assistant', msg));
    }

    btnMinimize.addEventListener('click', () => window.aris && window.aris.minimizeWindow());
  </script>
</body>
</html>
